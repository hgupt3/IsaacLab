<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UR5e Gemini WSG50 Calibration</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #1f2933;
      background: #eef1f4;
    }
    #app {
      display: grid;
      grid-template-columns: 380px 1fr;
      height: 100vh;
      width: 100vw;
    }
    #panel {
      background: #fbfcfd;
      border-right: 1px solid #cfd6df;
      overflow: auto;
      padding: 16px;
    }
    #viewport {
      position: relative;
      min-width: 0;
      background: #dfe5eb;
    }
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0;
    }
    h2 {
      margin: 18px 0 8px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0;
      color: #374151;
    }
    .toolbar {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }
    button {
      height: 34px;
      border: 1px solid #9ba9b7;
      background: #ffffff;
      color: #18212f;
      border-radius: 6px;
      font-weight: 650;
      cursor: pointer;
    }
    button.primary {
      background: #145f7f;
      color: #ffffff;
      border-color: #145f7f;
    }
    button:hover { filter: brightness(0.97); }
    #status {
      min-height: 34px;
      border: 1px solid #cfd6df;
      border-radius: 6px;
      padding: 8px;
      font-size: 12px;
      color: #334155;
      background: #ffffff;
      margin-bottom: 12px;
      word-break: break-word;
    }
    .section {
      border-top: 1px solid #dde3ea;
      padding-top: 10px;
    }
    .row {
      display: grid;
      grid-template-columns: 46px 1fr 82px;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
    }
    .row label {
      font-size: 12px;
      color: #52606d;
    }
    .legend {
      display: grid;
      grid-template-columns: 18px 1fr;
      gap: 8px;
      align-items: center;
      font-size: 12px;
      color: #475569;
      margin: 6px 0;
    }
    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid rgba(15, 23, 42, 0.22);
    }
    input[type="range"] {
      width: 100%;
      accent-color: #145f7f;
    }
    input[type="number"] {
      width: 82px;
      height: 28px;
      border: 1px solid #b8c4d0;
      border-radius: 5px;
      padding: 3px 6px;
      background: #ffffff;
      color: #1f2933;
    }
    #overlay {
      position: absolute;
      left: 12px;
      bottom: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.88);
      border: 1px solid rgba(148, 163, 184, 0.55);
      color: #334155;
      font-size: 12px;
      pointer-events: none;
    }
    @media (max-width: 900px) {
      #app { grid-template-columns: 1fr; grid-template-rows: 46vh 54vh; }
      #panel { order: 2; border-right: 0; border-top: 1px solid #cfd6df; }
      #viewport { order: 1; }
    }
  </style>
</head>
<body>
  <div id="app">
    <aside id="panel">
      <h1>UR5e Gemini WSG50</h1>
      <div class="toolbar">
        <button id="saveButton" class="primary">Save</button>
        <button id="reloadButton">Reload</button>
        <button id="resetViewButton">Reset View</button>
        <button id="zeroRotButton">Zero Rot</button>
        <button id="toggleContactButton">Toggle Contacts</button>
        <button id="toggleCollisionButton">Toggle Collisions</button>
      </div>
      <div id="status">Loading calibration...</div>
      <div class="legend"><span class="swatch" style="background:#ef4444"></span><span>Primitive collision geometry</span></div>
      <div class="legend"><span class="swatch" style="background:#f59e0b"></span><span>Pad normal direction</span></div>
      <div class="legend"><span class="swatch" style="background:#8b5cf6"></span><span>Contact point proxy</span></div>
      <div class="section">
        <h2>Default WSG Opening</h2>
        <div class="row">
          <label>m</label>
          <input id="openingRange" type="range" min="0.006" max="0.110" step="0.0005">
          <input id="openingNumber" type="number" min="0.006" max="0.110" step="0.0005">
        </div>
      </div>
      <div id="defaultPoseControls"></div>
      <div id="controls"></div>
    </aside>
    <main id="viewport">
      <div id="overlay">Axes: red X, green Y, blue Z</div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/build/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/STLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/OBJLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.132.2/examples/js/loaders/MTLLoader.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/urdf-loader@0.10.4/umd/URDFLoader.js"></script>

  <script>
    const TRANSFORMS = [
      ["ee_to_wsg_mount", "EE to WSG Mount", "wsg_mount_joint"],
      ["wsg_mount_to_wsg_base", "WSG Mount to WSG Base", "wsg_base_mount_joint"],
      ["wsg_base_to_wsg_mount_visual", "WSG Base to WSG Mount Visual", "wsg_mount_visual_joint"],
      ["wsg_base_to_camera_mount", "WSG Base to Gemini Mount", "gemini_mount_joint"],
      ["camera_mount_to_gemini", "Gemini Mount to Camera", "gemini_305_mount_joint"],
      ["left_slider_to_soft_finger", "Left Slider to Soft Finger", "soft_finger_left_joint"],
      ["right_slider_to_soft_finger", "Right Slider to Soft Finger", "soft_finger_right_joint"],
      ["left_soft_finger_to_holder_visual", "Left Soft Finger to Holder Visual", "finger_holder_left_visual_joint"],
      ["right_soft_finger_to_holder_visual", "Right Soft Finger to Holder Visual", "finger_holder_right_visual_joint"],
      ["left_soft_finger_to_tip", "Left Soft Finger to Tip", "left_tip_joint"],
      ["right_soft_finger_to_tip", "Right Soft Finger to Tip", "right_tip_joint"],
      ["wsg_base_to_palm_frame", "WSG Base to Palm Frame", "palm_frame_joint"],
    ];
    const ARM_JOINTS = [
      "ur5e_joint_1",
      "ur5e_joint_2",
      "ur5e_joint_3",
      "ur5e_joint_4",
      "ur5e_joint_5",
      "ur5e_joint_6",
    ];
    const AXES = ["x", "y", "z"];
    const ROT_AXES = ["roll", "pitch", "yaw"];
    const CONTACT_AXES = ["nx", "ny", "nz"];

    let calibration = null;
    let scene = null;
    let camera = null;
    let renderer = null;
    let controls = null;
    let robot = null;
    let axesGroup = null;
    let contactGroup = null;
    let collisionGroup = null;
    let showContacts = true;
    let showCollisions = true;

    const statusEl = document.getElementById("status");
    const controlsEl = document.getElementById("controls");
    const defaultPoseControlsEl = document.getElementById("defaultPoseControls");
    const viewportEl = document.getElementById("viewport");
    const openingRange = document.getElementById("openingRange");
    const openingNumber = document.getElementById("openingNumber");

    init();

    async function init() {
      initScene();
      await loadCalibration();
      buildDefaultPoseControls();
      buildControls();
      await loadRobot();
      animate();
    }

    function initScene() {
      scene = new THREE.Scene();
      scene.background = new THREE.Color(0xdfe5eb);

      camera = new THREE.PerspectiveCamera(50, viewportEl.clientWidth / viewportEl.clientHeight, 0.01, 10);
      camera.up.set(0, 0, 1);
      camera.position.set(0.65, -0.9, 0.55);

      renderer = new THREE.WebGLRenderer({ antialias: true });
      renderer.setPixelRatio(window.devicePixelRatio);
      renderer.setSize(viewportEl.clientWidth, viewportEl.clientHeight);
      viewportEl.appendChild(renderer.domElement);

      controls = new THREE.OrbitControls(camera, renderer.domElement);
      controls.target.set(0.12, 0, 0.08);
      controls.update();

      scene.add(new THREE.AmbientLight(0xffffff, 0.72));
      const key = new THREE.DirectionalLight(0xffffff, 0.55);
      key.position.set(0.8, -0.7, 1.2);
      scene.add(key);
      const fill = new THREE.DirectionalLight(0xffffff, 0.25);
      fill.position.set(-0.6, 0.8, 0.7);
      scene.add(fill);

      const grid = new THREE.GridHelper(1.0, 20, 0x6b7280, 0xb8c4d0);
      grid.rotation.x = Math.PI / 2;
      scene.add(grid);

      const baseAxes = new THREE.AxesHelper(0.16);
      scene.add(baseAxes);

      axesGroup = new THREE.Group();
      contactGroup = new THREE.Group();
      collisionGroup = new THREE.Group();
      scene.add(axesGroup);
      scene.add(contactGroup);
      scene.add(collisionGroup);

      window.addEventListener("resize", resize);
      document.getElementById("saveButton").addEventListener("click", saveCalibration);
      document.getElementById("reloadButton").addEventListener("click", loadRobot);
      document.getElementById("resetViewButton").addEventListener("click", resetView);
      document.getElementById("zeroRotButton").addEventListener("click", zeroSelectedRotations);
      document.getElementById("toggleContactButton").addEventListener("click", () => {
        showContacts = !showContacts;
        contactGroup.visible = showContacts;
      });
      document.getElementById("toggleCollisionButton").addEventListener("click", () => {
        showCollisions = !showCollisions;
        collisionGroup.visible = showCollisions;
      });
    }

    async function loadCalibration() {
      const response = await fetch("/api/calibration");
      calibration = await response.json();
      openingRange.value = calibration.default_pose.wsg_opening_m;
      openingNumber.value = calibration.default_pose.wsg_opening_m;
      openingRange.addEventListener("input", updateOpeningFromRange);
      openingNumber.addEventListener("input", updateOpeningFromNumber);
      setStatus("Calibration loaded.");
    }

    function buildDefaultPoseControls() {
      defaultPoseControlsEl.innerHTML = "";
      const section = document.createElement("section");
      section.className = "section";
      const title = document.createElement("h2");
      title.textContent = "Default Arm Pose";
      section.appendChild(title);
      for (const jointName of ARM_JOINTS) {
        section.appendChild(makeDefaultPoseRow(jointName));
      }
      defaultPoseControlsEl.appendChild(section);
    }

    function makeDefaultPoseRow(jointName) {
      const row = document.createElement("div");
      row.className = "row";
      const label = document.createElement("label");
      label.textContent = jointName.replace("ur5e_joint_", "j");
      const range = document.createElement("input");
      range.type = "range";
      range.min = -180;
      range.max = 180;
      range.step = 0.5;
      const number = document.createElement("input");
      number.type = "number";
      number.min = -180;
      number.max = 180;
      number.step = 0.5;

      const current = calibration.default_pose.arm_joints_deg[jointName];
      range.value = current;
      number.value = current;

      const update = (value) => {
        const parsed = Number(value);
        calibration.default_pose.arm_joints_deg[jointName] = parsed;
        range.value = parsed;
        number.value = parsed;
        applyDefaultPose();
      };
      range.addEventListener("input", () => update(range.value));
      number.addEventListener("input", () => update(number.value));

      row.appendChild(label);
      row.appendChild(range);
      row.appendChild(number);
      return row;
    }

    function buildControls() {
      controlsEl.innerHTML = "";
      for (const [key, label] of TRANSFORMS) {
        const section = document.createElement("section");
        section.className = "section";
        const title = document.createElement("h2");
        title.textContent = label;
        section.appendChild(title);
        for (let i = 0; i < 3; i++) {
          section.appendChild(makeNumberRow(key, "xyz", i, AXES[i], -0.25, 0.25, 0.0005));
        }
        for (let i = 0; i < 3; i++) {
          section.appendChild(makeNumberRow(key, "rpy_deg", i, ROT_AXES[i], -180, 180, 0.5));
        }
        controlsEl.appendChild(section);
      }
      buildContactControls();
    }

    function buildContactControls() {
      const section = document.createElement("section");
      section.className = "section";
      const title = document.createElement("h2");
      title.textContent = "Contact Normals";
      section.appendChild(title);
      for (const [bodyLink, marker] of Object.entries(calibration.contact_markers.pad_normals)) {
        const subtitle = document.createElement("h2");
        subtitle.textContent = bodyLink;
        section.appendChild(subtitle);
        for (let i = 0; i < 3; i++) {
          section.appendChild(makeContactNormalRow(bodyLink, marker, i));
        }
      }
      controlsEl.appendChild(section);
    }

    function makeContactNormalRow(bodyLink, marker, index) {
      const row = document.createElement("div");
      row.className = "row";
      const label = document.createElement("label");
      label.textContent = CONTACT_AXES[index];
      const range = document.createElement("input");
      range.type = "range";
      range.min = -1;
      range.max = 1;
      range.step = 0.05;
      const number = document.createElement("input");
      number.type = "number";
      number.min = -1;
      number.max = 1;
      number.step = 0.05;

      const current = marker.normal[index];
      range.value = current;
      number.value = current;

      const update = (value) => {
        const parsed = Number(value);
        calibration.contact_markers.pad_normals[bodyLink].normal[index] = parsed;
        range.value = parsed;
        number.value = parsed;
        updateContactMarkers();
      };
      range.addEventListener("input", () => update(range.value));
      number.addEventListener("input", () => update(number.value));

      row.appendChild(label);
      row.appendChild(range);
      row.appendChild(number);
      return row;
    }

    function makeNumberRow(transformKey, field, index, labelText, min, max, step) {
      const row = document.createElement("div");
      row.className = "row";
      const label = document.createElement("label");
      label.textContent = labelText;
      const range = document.createElement("input");
      range.type = "range";
      range.min = min;
      range.max = max;
      range.step = step;
      const number = document.createElement("input");
      number.type = "number";
      number.min = min;
      number.max = max;
      number.step = step;

      const current = calibration.transforms[transformKey][field][index];
      range.value = current;
      number.value = current;

      const update = (value) => {
        const parsed = Number(value);
        calibration.transforms[transformKey][field][index] = parsed;
        range.value = parsed;
        number.value = parsed;
        applyTransformsLive();
      };
      range.addEventListener("input", () => update(range.value));
      number.addEventListener("input", () => update(number.value));

      row.appendChild(label);
      row.appendChild(range);
      row.appendChild(number);
      return row;
    }

    function makeMeshLoader(manager) {
      return (path, _manager, onComplete) => {
        const finish = (obj) => {
          obj.traverse((child) => {
            if (!child.isMesh) return;
            if (path.toLowerCase().includes("base_plate")) {
              child.material = new THREE.MeshPhongMaterial({ color: 0x01010a, shininess: 12 });
            } else if (path.toLowerCase().includes("soft_gripper")) {
              child.material = new THREE.MeshPhongMaterial({ color: 0x030303, shininess: 18 });
            } else if (path.toLowerCase().includes("mount")) {
              child.material = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 16 });
            } else if (path.toLowerCase().includes("finger_holder")) {
              child.material = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 16 });
            } else if (path.toLowerCase().includes("wsg")) {
              child.material = new THREE.MeshPhongMaterial({ color: 0x6b7280, shininess: 20 });
            } else if (!child.material) {
              child.material = new THREE.MeshPhongMaterial({ color: 0xa4adb8 });
            }
            child.castShadow = true;
            child.receiveShadow = true;
          });
          onComplete(obj);
        };

        const assetPath = cacheBust(path);
        if (path.toLowerCase().endsWith(".stl")) {
          const loader = new THREE.STLLoader(manager);
          loader.load(assetPath, (geometry) => finish(new THREE.Mesh(geometry, new THREE.MeshPhongMaterial())));
          return;
        }

        const loadObj = () => {
          const objLoader = new THREE.OBJLoader(manager);
          objLoader.load(assetPath, finish, undefined, (error) => {
            console.error("OBJ load failed", path, error);
          });
        };
        const mtlPath = path.replace(/\.obj$/i, ".mtl");
        if (mtlPath === path) {
          loadObj();
          return;
        }
        if (/\/meshes\/base_plate\.obj$/i.test(path)) {
          loadObj();
          return;
        }
        const mtlLoader = new THREE.MTLLoader(manager);
        mtlLoader.load(cacheBust(mtlPath), (materials) => {
          materials.preload();
          const objLoader = new THREE.OBJLoader(manager);
          objLoader.setMaterials(materials);
          objLoader.load(assetPath, finish, undefined, loadObj);
        }, undefined, loadObj);
      };
    }

    function cacheBust(path) {
      return `${path}${path.includes("?") ? "&" : "?"}t=${Date.now()}`;
    }

    async function loadRobot() {
      if (robot) {
        scene.remove(robot);
        robot.traverse((child) => {
          if (child.geometry) child.geometry.dispose();
          if (child.material && child.material.dispose) child.material.dispose();
        });
        robot = null;
      }
      axesGroup.clear();
      contactGroup.clear();
      collisionGroup.clear();

      setStatus("Loading generated URDF...");
      const manager = new THREE.LoadingManager();
      const loader = new URDFLoader(manager);
      loader.loadMeshCb = makeMeshLoader(manager);
      loader.load(`/asset/${calibration.model.generated_urdf}?t=${Date.now()}`, (loadedRobot) => {
        robot = loadedRobot;
        robot.rotation.set(0, 0, 0);
        scene.add(robot);
        applyTransformsLive();
        applyDefaultPose();
        addFrameAxes();
        updateContactMarkers();
        updateCollisionVisuals();
        setStatus("URDF loaded.");
      }, undefined, (error) => {
        setStatus(`URDF load failed: ${error}`);
      });
    }

    function applyTransformsLive() {
      if (!robot || !robot.joints) return;
      for (const [key, _label, jointName] of TRANSFORMS) {
        const joint = robot.joints[jointName];
        if (!joint) continue;
        const tf = calibration.transforms[key];
        joint.position.set(tf.xyz[0], tf.xyz[1], tf.xyz[2]);
        joint.quaternion.copy(quaternionFromRpyDeg(tf.rpy_deg));
      }
      robot.updateMatrixWorld(true);
      updateFrameAxes();
      updateContactMarkers();
      updateCollisionVisuals();
    }

    function quaternionFromRpyDeg(rpyDeg) {
      return new THREE.Quaternion().setFromEuler(new THREE.Euler(
        THREE.MathUtils.degToRad(rpyDeg[0]),
        THREE.MathUtils.degToRad(rpyDeg[1]),
        THREE.MathUtils.degToRad(rpyDeg[2]),
        "ZYX"
      ));
    }

    function addFrameAxes() {
      if (!robot || !robot.links) return;
      axesGroup.clear();
      for (const name of ["ee_link", "wsg_base_link", "wsg_mount_visual_link", "palm_frame", "gemini_305_left_camera_optical_frame", "finger_holder_left_visual_link", "finger_holder_right_visual_link", "left_tip", "right_tip"]) {
        const link = robot.links[name];
        if (!link) continue;
        const axes = new THREE.AxesHelper(name === "wsg_base_link" ? 0.08 : 0.045);
        axes.userData.linkName = name;
        axesGroup.add(axes);
      }
      updateFrameAxes();
    }

    function updateFrameAxes() {
      if (!robot || !robot.links) return;
      axesGroup.children.forEach((axes) => {
        const link = robot.links[axes.userData.linkName];
        if (!link) return;
        axes.matrix.copy(link.matrixWorld);
        axes.matrixAutoUpdate = false;
      });
    }

    function updateContactMarkers() {
      if (!robot || !robot.links || !contactGroup) return;
      contactGroup.clear();
      contactGroup.visible = showContacts;
      for (const [bodyLinkName, marker] of Object.entries(calibration.contact_markers.pad_normals)) {
        const bodyLink = robot.links[bodyLinkName];
        const originLink = robot.links[marker.origin_link];
        if (!bodyLink || !originLink) continue;
        const origin = new THREE.Vector3().setFromMatrixPosition(originLink.matrixWorld);
        const direction = new THREE.Vector3(marker.normal[0], marker.normal[1], marker.normal[2]);
        if (direction.lengthSq() <= 1e-12) continue;
        direction.normalize();
        const bodyQuat = new THREE.Quaternion().setFromRotationMatrix(bodyLink.matrixWorld);
        direction.applyQuaternion(bodyQuat).normalize();

        const arrow = new THREE.ArrowHelper(direction, origin, 0.065, 0xf59e0b, 0.018, 0.010);
        const sphere = new THREE.Mesh(
          new THREE.SphereGeometry(0.006, 16, 16),
          new THREE.MeshBasicMaterial({ color: 0x8b5cf6 })
        );
        sphere.position.copy(origin);
        contactGroup.add(arrow);
        contactGroup.add(sphere);
      }
    }

    function updateCollisionVisuals() {
      if (!robot || !robot.links || !collisionGroup) return;
      collisionGroup.clear();
      collisionGroup.visible = showCollisions;
      for (const primitiveSet of [calibration.arm_collision_primitives, calibration.collision_primitives]) {
        for (const [linkName, primitives] of Object.entries(primitiveSet)) {
          const link = robot.links[linkName];
          if (!link) continue;
          for (const primitive of primitives) {
            const visual = makeCollisionPrimitiveVisual(primitive);
            const localMatrix = collisionPrimitiveMatrix(primitive);
            visual.matrix.copy(link.matrixWorld.clone().multiply(localMatrix));
            visual.matrixAutoUpdate = false;
            collisionGroup.add(visual);
          }
        }
      }
    }

    function makeCollisionPrimitiveVisual(primitive) {
      let geometry = null;
      if (primitive.type === "box") {
        geometry = new THREE.BoxGeometry(primitive.size[0], primitive.size[1], primitive.size[2]);
      } else if (primitive.type === "cylinder") {
        geometry = new THREE.CylinderGeometry(primitive.radius, primitive.radius, primitive.length, 24);
        geometry.rotateX(Math.PI / 2);
      } else {
        throw new Error(`Unsupported collision primitive type: ${primitive.type}`);
      }

      const group = new THREE.Group();
      const surface = new THREE.Mesh(
        geometry,
        new THREE.MeshBasicMaterial({
          color: 0xef4444,
          transparent: true,
          opacity: 0.22,
          depthWrite: false,
        })
      );
      const edges = new THREE.LineSegments(
        new THREE.EdgesGeometry(geometry),
        new THREE.LineBasicMaterial({ color: 0x991b1b, transparent: true, opacity: 0.82 })
      );
      group.add(surface);
      group.add(edges);
      return group;
    }

    function collisionPrimitiveMatrix(primitive) {
      const matrix = new THREE.Matrix4();
      const pos = new THREE.Vector3(primitive.xyz[0], primitive.xyz[1], primitive.xyz[2]);
      const quat = quaternionFromRpyDeg(primitive.rpy_deg);
      matrix.compose(pos, quat, new THREE.Vector3(1, 1, 1));
      return matrix;
    }

    function updateOpeningFromRange() {
      openingNumber.value = openingRange.value;
      calibration.default_pose.wsg_opening_m = Number(openingRange.value);
      applyOpening();
    }

    function updateOpeningFromNumber() {
      openingRange.value = openingNumber.value;
      calibration.default_pose.wsg_opening_m = Number(openingNumber.value);
      applyOpening();
    }

    function applyDefaultPose() {
      applyArmPose();
      applyOpening();
    }

    function applyArmPose() {
      if (!robot) return;
      const jointValues = {};
      for (const jointName of ARM_JOINTS) {
        jointValues[jointName] = THREE.MathUtils.degToRad(calibration.default_pose.arm_joints_deg[jointName]);
      }
      robot.setJointValues(jointValues);
      robot.updateMatrixWorld(true);
      updateFrameAxes();
      updateContactMarkers();
      updateCollisionVisuals();
    }

    function applyOpening() {
      if (!robot) return;
      const opening = Number(calibration.default_pose.wsg_opening_m);
      const left = Math.min(-0.0027, Math.max(-0.055, -opening / 2));
      const right = Math.max(0.0027, Math.min(0.055, opening / 2));
      robot.setJointValues({
        wsg_left_finger_joint: left,
        wsg_right_finger_joint: right,
      });
      robot.updateMatrixWorld(true);
      updateFrameAxes();
      updateContactMarkers();
      updateCollisionVisuals();
    }

    async function saveCalibration() {
      setStatus("Saving calibration and regenerating URDF...");
      const response = await fetch("/api/calibration", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          transforms: calibration.transforms,
          default_pose: calibration.default_pose,
          contact_markers: calibration.contact_markers,
        }),
      });
      const result = await response.json();
      if (result.status !== "ok") {
        setStatus(`Save failed: ${result.error || result.stderr || "unknown error"}`);
        return;
      }
      setStatus("Saved and regenerated URDF.");
      await loadRobot();
    }

    function resetView() {
      camera.position.set(0.65, -0.9, 0.55);
      controls.target.set(0.12, 0, 0.08);
      controls.update();
    }

    function zeroSelectedRotations() {
      for (const [key] of TRANSFORMS) {
        calibration.transforms[key].rpy_deg = [0, 0, 0];
      }
      buildControls();
      applyTransformsLive();
      setStatus("All adjustable rotations set to zero in the editor state.");
    }

    function setStatus(text) {
      statusEl.textContent = text;
    }

    function resize() {
      camera.aspect = viewportEl.clientWidth / viewportEl.clientHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(viewportEl.clientWidth, viewportEl.clientHeight);
    }

    function animate() {
      requestAnimationFrame(animate);
      controls.update();
      renderer.render(scene, camera);
    }
  </script>
</body>
</html>
