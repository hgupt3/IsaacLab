# Kuka + Allegro Hand robot configuration
# All robot-specific parameters: kinematics, cameras, hand defaults
robot:
  action_scale: 0.1
  arm_joint_count: 7
  hand_joint_count: 16
  eigen_dim: 5                  # PCA dimensions for eigen grasp
  use_target_tracking: true     # delta-from-target + EMA (SimToolReal-style)
  ema_alpha: 0.1                # EMA blend factor (0.1 = heavy smoothing, 1.0 = no smoothing)
  palm_body_name: "palm_link"   # Kuka's palm_link frame is already correct
  wrist_joint_name: "iiwa7_joint_7"
  arm_joint_regex: "iiwa7_joint_.*"
  hand_body_regex: "(palm_link|.*_link_[0-3]|.*_tip)"  # Kuka keeps palm_link as real body
  palm_frame_offset: null       # Kuka palm_link is already the correct frame
  tip_offsets: null              # Kuka tip bodies exist as real bodies

wrist_camera:
  width: 64                      # Kuka uses square image
  height: 64
  focal_length: 1.78             # Kuka's original tuned value (~120° HFOV)
  horizontal_aperture: 6.17     # Virtual sensor width (mm)
  clipping_range: [0.0001, 0.5]  # Kuka's original clipping range
  offset:
    pos: [-0.1, 0.0, 0.05]      # Tuned in Isaac Sim GUI
    rot: [-90.0, -90.0, 0.0]

# Default finger joint positions (Allegro hand)
rewards:
  finger_regularizer:
    params:
      default_joints: [0.0315, 0.0764, 0.0196, 0.2944, -0.0010, 0.1109, 0.0309, 0.2541, -0.0067, 0.1260, 0.0697, 0.2933, 1.5165, -0.2420, 0.3112, 0.3816]

