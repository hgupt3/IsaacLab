# UR5e + LEAP Hand robot configuration
# All robot-specific parameters: kinematics, cameras, hand defaults
robot:
  action_scale: 0.1
  arm_joint_count: 6
  hand_joint_count: 16
  eigen_dim: 5                  # PCA dimensions for eigen grasp
  use_target_tracking: true     # delta-from-target + EMA (SimToolReal-style)
  ema_alpha: 0.2                # EMA blend factor (0.1 = heavy smoothing, 1.0 = no smoothing)
  palm_body_name: "ur5e_link_6"  # Body used for palm pose tracking (palm_link merged into link_6)
  wrist_joint_name: "ur5e_joint_6"         # Wrist joint (separate randomization range)
  arm_joint_regex: "ur5e_joint_.*"         # Regex matching all arm joints (including wrist)
  hand_body_regex: "(ur5e_link_6|.*_link_[0-3]|.*_tip)"  # Hand bodies for table penetration check
  palm_frame_offset:            # Offset from palm_body_name to virtual palm_frame (null = no offset)
    pos: [-0.008, -0.0345, 0.11]
    rot_euler: [0.0, -90.0, 90.0]  # Euler XYZ degrees
  tip_offsets:                  # Offsets from link_3 bodies to virtual tip positions
    index: [0.0, -0.048, 0.015]
    middle: [0.0, -0.048, 0.015]
    ring: [0.0, -0.048, 0.015]
    thumb: [0.0, -0.06, -0.015]

  # Contact sensor layout — drives both sensor creation in the robot mixin and the
  # reward computation in mdp/rewards.py. Single source of truth for this robot.
  contact_layout:
    sensor_prim_prefix: ""           # LEAP hand bodies live directly under /Robot/
    # Tier 1: per-finger contact. Thumb gates; index/middle/ring sorted+weighted.
    thumb_bodies: ["thumb_link_3"]
    finger_bodies:
      - ["index_link_3",  "index_link_2"]
      - ["middle_link_3", "middle_link_2"]
      - ["ring_link_3",   "ring_link_2"]
    # Tier 2: flat capped bonus from proximal phalanges + palm (non-fingertip strategies).
    # palm_link itself is not sensable — the fixed hand_base_joint causes URDF→USD
    # (merge_fixed_joints=True) to weld palm_link's collision boxes into ur5e_link_6.
    # So palm-object contacts are reported on the ur5e_link_6 rigid body; sensing it
    # here captures real palm contact. Minor contamination: ur5e_link_6 also has a
    # small wrist cylinder (35mm × 40mm) behind the palm — rarely contacts the object.
    palm_proximal_bodies: ["ur5e_link_6", "index_link_1", "middle_link_1", "ring_link_1", "thumb_link_1"]
    # Self-contact penalty: residual of net_forces - object_filter on these sensors.
    self_contact_bodies:
      ["thumb_link_3", "index_link_3", "middle_link_3", "ring_link_3",
       "thumb_link_2", "index_link_2", "middle_link_2", "ring_link_2"]
    # Pad-normal in body local frame. Pad = -X for all LEAP finger links.
    pad_normals:
      thumb_link_3:  [-1.0, 0.0, 0.0]
      index_link_3:  [-1.0, 0.0, 0.0]
      index_link_2:  [-1.0, 0.0, 0.0]
      middle_link_3: [-1.0, 0.0, 0.0]
      middle_link_2: [-1.0, 0.0, 0.0]
      ring_link_3:   [-1.0, 0.0, 0.0]
      ring_link_2:   [-1.0, 0.0, 0.0]


# ==============================================================================
# WRIST CAMERA  (Gemini 305 depth — pinhole, square pixels, HFOV 88°)
# ==============================================================================
wrist_camera:
  width: 80                     # Gemini 305 native 4:3
  height: 60
  focal_length: 3.69            # 80° HFOV: 6.17 / (2×tan(40°))
  horizontal_aperture: 6.17     # Virtual sensor width (mm)
  clipping_range: [0.04, 0.5]   # Gemini 305 depth range: 4–100 cm

  # Offset: ur5e_link_6 → camera (opengl convention, Euler degrees)
  # Computed from URDF chain: link_6→ee_link→palm_link→camera
  offset:
    pos: [0.009, -0.0705, -0.0274]
    rot: [0.0, 0.0, 180.0]

# Default finger joint positions (LEAP hand)
rewards:
  finger_regularizer:
    params:
      default_joints: [0.0315, 0.0764, 0.0196, 0.2944, -0.0010, 0.1109, 0.0309, 0.2541, -0.0067, 0.1260, 0.0697, 0.2933, 1.5165, -0.2420, 0.3112, 0.3816]

