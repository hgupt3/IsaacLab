# ==============================================================================
# Student Mode Layer
# ==============================================================================
# Applied for distillation training (student learning from teacher).
# Enables student observations (visible point clouds + wrist camera).
# ==============================================================================

mode:
  use_student_mode: true

simulation:
  num_envs: 2048

curriculum:
  difficulty:
    initial: 0                   # Gradual curriculum (same as teacher)
    min: 0
  
  scheduler:
    step_interval: 30000
    level_overrides:
