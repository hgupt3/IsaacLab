# ==============================================================================
# Student Play Mode Layer
# ==============================================================================
# Additional overrides for student play (on top of student + play layers).
# Enables student-specific visualization markers.
# ==============================================================================

# Re-enable student mode (play.yaml disables it for teacher play)
mode:
  use_student_mode: true

# Student-specific visualization
visualization:
  targets: false
  current_object: false
  student_visible: true
  student_target: true
