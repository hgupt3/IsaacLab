# ==============================================================================
# Keyboard Debug Mode Layer
# ==============================================================================
# Minimal config for keyboard-controlled palm exploration.
# Usage: Y2R_MODE=keyboard ./scripts/keyboard.sh
# ==============================================================================

simulation:
  num_envs: 1

terminations:
  trajectory_deviation:
    position_threshold: [999.0, 999.0]
    rotation_threshold: [999.0, 999.0]
  hand_pose_deviation:
    position_threshold: [999.0, 999.0]
    rotation_threshold: [999.0, 999.0]

visualization:
  pose_axes: true
  targets: false
  current_object: false
  waypoint_region: true
  goal_region: true
  env_ids: null
  debug_print_rewards: false

mode:
  use_student_mode: true

trajectory:
  segments:
    - name: "hold"
      type: "waypoint"
      pose: null
      duration: 10000.0
      hand_coupling_weights:
        full: 1.0

procedural_objects:
  generation:
    num_shapes: 1

