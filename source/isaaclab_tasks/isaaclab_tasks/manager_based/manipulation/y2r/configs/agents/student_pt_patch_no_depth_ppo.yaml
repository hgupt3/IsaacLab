# =============================================================================
# Student Policy Configuration: Patch-Tokenized arch (no wrist depth)
# =============================================================================
# Same as student_pt_patch_ppo.yaml but drops the wrist depth camera entirely.
# The depth_patch_transformer_student model reads `mode.use_depth_camera` from
# y2r_cfg (set false by configs/layers/no_depth.yaml under
# Y2R_MODE=distill_no_depth) and skips the ConvStem tokenizer + obs split,
# so cross-attention sees only PC tokens.
#
# Differences from student_pt_patch_ppo.yaml:
#   - obs_groups.obs:  removed "student_camera"
#   - config.name:     ..._no_depth_distillation
#   - depth_tokenizer/aug:  left in place; ignored by the network when
#                            use_depth_camera=False (kept here so the YAML
#                            stays drop-in for any future re-enable).
# =============================================================================

params:
  seed: 42

  # Environment wrapper clipping
  env:
    clip_observations: 100.0
    clip_actions: 100.0
    
    # Observation groups for student policy
    obs_groups:
      obs: ["policy", "student_proprio", "student_current_poses", "student_future_poses", "student_current_pc", "student_future_pc"]
      states: ["policy", "proprio", "current_poses", "future_poses", "current_pc", "future_pc"]  
    concate_obs_groups: True

  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  # ==========================================================================
  # NETWORK ARCHITECTURE
  # ==========================================================================
  network:
    name: depth_patch_transformer_student
    separate: False

    # IMPORTANT:
    # We pack depth into obs, so RL-Games' global RunningMeanStd (config.normalize_input)
    # would incorrectly normalize depth. We therefore disable RL-Games normalize_input
    # and do non-depth normalization inside the model instead.
    normalize_base_obs: True

    # --- Point Transformer ---
    hidden_dim: 128                   # Token embedding dimension
    num_heads: 8                     # head_dim = 128/8 = 16
    self_attention: True             # Self-attend over combined PC + depth tokens before cross-attn
    use_global_feature: False        # No global pool side-channel — depth stays in K/V via attention only
    flash_attention: False           # Force MATH SDPA: at small S_kv (16 PC + ~20 depth tokens) EFFICIENT_ATTENTION reserves ~10+ GB workspace; MATH uses ~500 MB
    torch_compile: False             # Keep disabled in distillation by default
    ffn_ratio: 2.0                   # FFN expansion ratio (used by self-attention block)
    ffn_dropout: 0.0
    attn_dropout: 0.0

    # Point encoder: per-point MLP (num_timesteps*3 → hidden_dim)
    point_encoder_layers: [128, 128]
    point_encoder_norm: True         # LayerNorm after encoder

    # Proprio encoder: MLP (proprio_dim → hidden_dim)
    proprio_encoder_layers: [128, 128]
    proprio_encoder_norm: True

    # --- Depth Tokenizer (ViT-style ConvStem patches) ---
    # Stack of stride-2 conv layers (Conv3x3 + GroupNorm + GELU) on the depth
    # image. NO global average pool — instead the resulting (H', W') grid is
    # flattened into num_tokens = H' * W' tokens of dimension hidden_dim.
    # A learnable 2D positional embedding is added to each token.
    # The tokens then JOIN the point cloud tokens in the cross-attention K/V set,
    # so depth participates in the attention mechanism rather than being a
    # single GAP'd vector dumped into the trunk concat.
    # Height/width are taken from the active Y2R config (robot + mode layers).
    depth_tokenizer:
      channels: [32, 64, 128, 128]   # 4 stride-2 stages; last channel = hidden_dim
      pe_init_std: 0.02              # init std for the learnable 2D PE
      modality_embedding: True       # learnable PC vs depth modality embedding

    # Depth augmentation (GPU-accelerated via NVIDIA Warp)
    # Applied INSIDE the model when explicit apply_depth_aug=True (set by train/distill/play code).
    depth_augmentation: True
    depth_aug_config:
      correlated_noise:
        sigma_s: 0.0375           # Spatial noise (1/8 of pre-quarter original)
        sigma_d: 0.0125           # Depth noise (1/8 of pre-quarter original)
      pixel_dropout_and_randu:
        p_dropout: 0.000375       # Dropout probability (1/8 of pre-quarter original)
        p_randu: 0.000375         # Random uniform probability (1/8 of pre-quarter original)
      sticks:
        p_stick: 0.00003125       # Stick artifact probability (1/8 of pre-quarter original)
        max_stick_len: 12.0       # Max stick length (pixels)
        max_stick_width: 2.0      # Max stick width (pixels)
    
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: 'fixed'
    
    mlp:
      units: [1024, 512, 256, 128]
      activation: elu
      d2rl: False
      initializer:
        name: default
      regularizer:
        name: None

  load_checkpoint: False
  load_path: ''

  # ==========================================================================
  # RL-GAMES CONFIG (matches teacher config structure)
  # ==========================================================================
  config:
    name: student_pt_patch_no_depth_distillation
    env_name: rlgpu
    device: 'cuda:0'
    device_name: 'cuda:0'
    multi_gpu: False
    ppo: True
    mixed_precision: True
    normalize_input: False
    normalize_value: True
    value_bootstrap: False
    num_actors: -1
    reward_shaper:
      scale_value: 0.01
    normalize_advantage: True
    gamma: 0.998
    tau: 0.95
    learning_rate: 3e-4
    lr_schedule: adaptive
    schedule_type: legacy
    kl_threshold: 0.016
    score_to_win: 100000000
    max_epochs: 750000
    save_best_after: 100
    save_frequency: 50
    print_stats: True
    grad_norm: 1.0
    entropy_coef: 0.002
    truncate_grads: True
    e_clip: 0.2
    horizon_length: 16
    minibatch_size: 8192
    mini_epochs: 4
    critic_coef: 4
    freeze_critic: False
    clip_value: True
    clip_actions: False
    seq_len: 4
    bounds_loss_coef: 0.0001

    # SAPG (disabled by default - set expl_type to 'mixed_expl_learn_param' to enable)
    use_others_experience: 'none'
    off_policy_ratio: 1.0
    expl_type: 'none'
    expl_reward_coef_embd_size: 32
    expl_reward_coef_scale: 0.005
    expl_reward_type: entropy
    expl_coef_block_size: 4096
    good_reset_boundary: 0

  # ==========================================================================
  # DISTILLATION SETTINGS (used by DistillAgent)
  # Note: seq_length from config: section is used for RNN truncated BPTT
  # Note: Depth augmentation is handled INSIDE the model (see network.depth_augmentation)
  # ==========================================================================
  distillation:
    mode: hybrid # 'dagger' or 'hybrid'

    # DAgger training (mode: dagger only)
    loss_type: mse # 'weighted_l2' (sigma-weighted L2 + sigma loss) or 'mse' (plain MSE on means)
    learning_rate: 0.0           # Adam lr for DAgger optimizer
    grad_norm: 1.0                # Gradient clipping for DAgger
    max_iterations: 100000000     # Total training iterations
    save_frequency: 5000          # Checkpoint save interval (iterations, not frames)
    save_best_after: 10000        # Don't save "best" until this many epochs/iters (avoid early noise)
    beta: 0.5                     # Fraction of envs using teacher (0.5 = 50%)
    distill_value: True           # Distill teacher's value function (warm critic for RL fine-tuning)
    distill_value_coef: 1.0       # Coefficient for value distillation loss

    # Hybrid (PHP) schedule — BC loss is auto-balanced to PPO scale via EMA,
    # so lambda_d directly controls relative BC influence (1.0 = equal, 2.0 = 2x BC).
    lambda_d_initial: 1.0
    lambda_d_min: 0.1
    lambda_d_anneal_epochs: 1000
    adaptive_lr_gate_lambda_ppo: 0.1
    # BC coefficient mode: "auto" (EMA-balanced to PPO scale) or "manual" (fixed multiplier)
    bc_coef_mode: manual
    bc_manual_coef: 10.0               # Used only when bc_coef_mode: manual
